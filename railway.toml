[build]
builder = "DOCKERFILE"

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
requiredMountPath = "/data"

[variables]
OPENCLAW_VERSION = "2026.4.23"
NODE_ENV = "production"

DEEPSEEK_API_KEY = ""
OPENAI_API_KEY = ""
OPENROUTER_API_KEY = ""
LITELLM_API_KEY = ""
CUSTOM_API_KEY = ""

OPENCLAW_GATEWAY_TOKEN = ""
SETUP_PASSWORD = ""

CLAWDBOT_DEFAULT_PROVIDER = "deepseek"
CLAWDBOT_DEFAULT_MODEL = "deepseek/deepseek-chat"

CLAWDBOT_ENABLE_VK = "false"
VK_COMMUNITY_TOKEN = ""
VK_GROUP_ID = ""

OPENCLAW_VERIFY_LIVE_MODEL = "false"
CLAWDBOT_RUN_DOCTOR = "true"
CLAWDBOT_SYNC_CONFIG_FROM_ENV = "true"
